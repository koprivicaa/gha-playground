name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ---- Concurrency control --------------------------------------------------
# Group runs by workflow + ref. Two pushes to the same PR will cancel the
# older run mid-flight (fast feedback). On main we DON'T cancel — every
# commit on main should be verified end-to-end.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege permissions. We only need to read the repo.
# (For OIDC -> AWS, you'd add `id-token: write` — that goes in a separate
# deploy workflow, not the build/test one.)
permissions:
  contents: read

jobs:
  # ---- Lint: single newest Go version, fail fast --------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true   # caches both module cache and build cache

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

  # ---- Test: matrix across 3 Go versions ----------------------------------
  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      # Show ALL failing Go versions, not just the first one to break.
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests (race detector + coverage)
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go${{ matrix.go-version }}
          path: coverage.out
          retention-days: 7
          if-no-files-found: warn

  # ---- Build: only after lint + test all pass -----------------------------
  # `needs:` ensures we never produce a binary from broken code.
  build:
    name: build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.commit=${GITHUB_SHA::7}" \
            -o app .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-linux-amd64
          path: app
          retention-days: 14
