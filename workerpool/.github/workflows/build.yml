name: Build 

on:
    pull_request:
        branches:
            - main
            - develop
            - staging

permissions:
    contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
    validate:
        name: Validate
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.22"
                  cache: true

            - name: Verify dependencies
              run: go mod tidy && git diff --exit-code go.mod go.sum

            - name: Check formatting
              run: |
                test -z "$(gofmt -l .)"

            - name: Run go vet
              run: go vet ./...

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v3
              with:
                version: v1.52.2
              

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: validate
        steps:
            - name: Checkout code
              uses: actions/checkout@v6 
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.22"
                  cache: true
            - name: Run tests 
              run: go test -v -coverprofile=coverage.out ./...
            - name: Upload artifact
              uses: actions/upload-artifact@v3
              with:
                  name: coverage-report
                  path: coverage.out

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: Checkout code
              uses: actions/checkout@v6 
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.22"
                  cache: true
            - name: Build application
              run: go build -v
