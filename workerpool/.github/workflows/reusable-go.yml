    name: Reusable Go
    run-name: Go ${{ inputs.go-version }} Quality Checks

    on:
        workflow_call:
            inputs:
                go-version:
                    description: "Go version"
                    required: false
                    default: "1.22"
                    type: string
                coverage-threshold:
                    description: "Minimum coverage percent"
                    required: false
                    default: 80
                    type: number

    permissions:
        contents: read
    
    jobs:
        validate-test-build:
            name: Validate, Test and Build
            runs-on: ubuntu-latest
            steps:
                - name: Checkout code
                  uses: actions/checkout@v6

                - name: Set up Go
                  uses: actions/setup-go@v6
                  with:
                      go-version: ${{ inputs.go-version }}
                      cache: true

                - name: Verify dependencies
                  run: go mod tidy && git diff --exit-code go.mod go.sum

                - name: Check formatting
                  run: |
                    test -z "$(gofmt -l .)"

                - name: Run go vet
                  run: go vet ./...

                - name: Run golangci-lint
                  uses: golangci/golangci-lint-action@v3
                  with:
                    version: v1.52.2

                - name: Run tests 
                  run: go test -v -coverprofile=coverage.out ./...