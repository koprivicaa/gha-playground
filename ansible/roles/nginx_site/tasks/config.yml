- name: Set nginx config path (Debian uses sites-available, RedHat uses conf.d)
  set_fact:
    nginx_conf_dir: "{{ '/etc/nginx/sites-available' if ansible_facts['os_family'] == 'Debian' else '/etc/nginx/conf.d' }}"

- name: Create site config
  template:
    src: site.conf.j2
    dest: "{{ nginx_conf_dir }}/{{ site_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload nginx
